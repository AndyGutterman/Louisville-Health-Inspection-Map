name: Ingest ArcGIS -> Supabase
on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 8 * * *"
concurrency: ingest
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Test
        run: npm test

      - name: Recover failed runs
        run: node Recover.js

      - name: Seed facilities
        run: node seed_facilities.js

      - name: Overlay geometry — pass 1
        run: node overlay_geometry.js

      - name: Seed inspections
        run: node seed_inspections.js

      - name: Overlay geometry — pass 2
        run: node overlay_geometry.js

      - name: Backfill facility types
        run: node backfill_types.js

      - name: Geocode missing geometry
        run: node geocode_missing.js

      - name: Seed violations
        run: node seed_violations.js

      - name: Seed categories
        run: node seed_categories.js