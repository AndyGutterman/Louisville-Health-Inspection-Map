name: Ingest ArcGIS -> Supabase
on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 8 * * *"
concurrency: ingest
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Test
        run: npm test
      # ── Recovery pass (always runs first) ────────────────────────────────────
      - name: Recover failed runs
        run: node recover.js

      # ── Daily sync ────────────────────────────────────────────────────────────
      - name: Seed facilities (FoodServiceData)
        run: node seed_facilities.js
      - name: Overlay geometry (FoodMapping)
        run: node overlay_geometry.js
      # Fills in coordinates for any facilities still missing after FoodMapping.
      # Covers new permits that haven't propagated to FoodMapping yet.
      - name: Geocode missing facilities
        run: node geocode_missing.js
      - name: Seed inspections
        run: node seed_inspections.js
      - name: Seed violations
        run: node seed_violations.js
      - name: Seed categories
        run: node seed_categories.js